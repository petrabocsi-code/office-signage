<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recart · SMS/MMS This Month</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/theme.css">
<style>
  .screen { grid-template-rows: auto 1fr; }
  .brand-cell {
    padding: 5vh 4.5vw 3vh;
    border-right: 1px solid rgba(255,255,255,0.06);
    position: relative; z-index: 1;
  }
  .brand { display: flex; flex-direction: column; align-items: flex-start; }
  .logo-wrap {
    margin-bottom: clamp(14px,2vh,28px);
    opacity: 0; animation: fadeUp 0.5s 0.05s forwards;
  }
  .logo-wrap svg { display: block; height: clamp(20px,2.6vw,38px); width: auto; }
  .top-label {
    font-size: clamp(10px,1.1vw,15px); font-weight: 700;
    letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase;
    opacity: 0; animation: fadeUp 0.6s 0.15s forwards;
  }
  .stat-title {
    padding: 0 4.5vw; display: flex; align-items: center;
    border-right: 1px solid rgba(255,255,255,0.06);
    position: relative; z-index: 1;
    opacity: 0; animation: fadeUp 0.7s 0.25s forwards;
  }
  .stat-title-text {
    font-size: clamp(40px, 5.8vw, 84px); font-weight: 900;
    color: var(--fg); line-height: 0.9;
    text-transform: uppercase; letter-spacing: -0.02em;
  }
  .stat-right {
    display: flex; align-items: center; justify-content: center;
    padding: 0 5vw; position: relative; z-index: 1;
  }
  .stat-number {
    font-size: clamp(80px, 18vw, 260px); font-weight: 900;
    color: var(--accent); line-height: 0.88;
    letter-spacing: -0.04em;
    opacity: 0; animation: fadeUp 0.8s 0.35s forwards;
  }
</style>
</head>
<body>
<div class="screen">
  <canvas class="bg-canvas" id="bgCanvas"></canvas>
  <div class="clock" id="clock-el"></div>
  <div class="brand-cell">
    <div class="brand">
      <div class="logo-wrap"></div>
      <div class="top-label">Budapest office</div>
    </div>
  </div>
  <div></div>

  <div class="stat-title">
    <div class="stat-title-text">SMS/MMS<br>sent this<br>month</div>
  </div>
  <div class="stat-right">
    <div class="stat-number">13.13M</div>
  </div>
</div>
<script src="../shared/chrome.js"></script>
</body>
</html>
