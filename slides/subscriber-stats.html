<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recart · Subscriber Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/theme.css">
<style>
  .screen {
    grid-template-rows: auto 1fr auto 1fr;
  }
  .brand-cell {
    padding: 5vh 4.5vw 3vh;
    border-right: 1px solid rgba(255,255,255,0.06);
    position: relative; z-index: 1;
  }
  .brand { display: flex; flex-direction: column; align-items: flex-start; }
  .logo-wrap {
    margin-bottom: clamp(14px,2vh,28px);
    opacity: 0; animation: fadeUp 0.5s 0.05s forwards;
  }
  .logo-wrap svg { display: block; height: clamp(20px,2.6vw,38px); width: auto; }
  .top-label {
    font-size: clamp(10px,1.1vw,15px); font-weight: 700;
    letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase;
    opacity: 0; animation: fadeUp 0.6s 0.15s forwards;
  }
  .stat-title {
    padding: 0 4.5vw; display: flex; align-items: center;
    border-right: 1px solid rgba(255,255,255,0.06);
    position: relative; z-index: 1;
    opacity: 0; animation: fadeUp 0.7s forwards;
  }
  .stat-title-text {
    font-size: clamp(28px, 3.8vw, 56px); font-weight: 900;
    color: var(--fg); line-height: 0.92;
    text-transform: uppercase; letter-spacing: -0.02em;
  }
  .stat-value {
    padding: 0 5vw; display: flex; flex-direction: column;
    justify-content: center; gap: clamp(6px,1vh,12px);
    position: relative; z-index: 1;
    opacity: 0; animation: fadeUp 0.7s forwards;
  }
  .stat-number {
    font-size: clamp(60px, 10vw, 140px); font-weight: 900;
    color: var(--accent); line-height: 0.88;
    letter-spacing: -0.04em; font-variant-numeric: tabular-nums;
  }
  .stat-delta {
    font-size: clamp(11px, 1vw, 15px); font-weight: 600;
    color: rgba(255,255,255,0.5); letter-spacing: 0.02em;
  }
  .full-divider {
    grid-column: 1 / -1; height: 1px;
    background: rgba(255,255,255,0.07);
    position: relative; z-index: 1;
  }
</style>
</head>
<body>
<div class="screen">
  <canvas class="bg-canvas" id="bgCanvas"></canvas>
  <div class="clock" id="clock-el"></div>

  <div class="brand-cell">
    <div class="brand">
      <div class="logo-wrap"></div>
      <div class="top-label">Budapest office</div>
    </div>
  </div>
  <div></div><!-- right spacer for brand row -->

  <div class="stat-title" style="animation-delay:0.25s">
    <div class="stat-title-text">Subscribers<br>created<br>this month</div>
  </div>
  <div class="stat-value" style="animation-delay:0.25s">
    <div class="stat-number">245.34K</div>
    <div class="stat-delta">−11.08K vs May 31 – Jun 6</div>
  </div>

  <div class="full-divider"></div>

  <div class="stat-title" style="animation-delay:0.4s">
    <div class="stat-title-text">Unsubscribed<br>this month</div>
  </div>
  <div class="stat-value" style="animation-delay:0.4s">
    <div class="stat-number">90.6K</div>
    <div class="stat-delta">+16.27K vs May 31 – Jun 6</div>
  </div>
</div>
<script src="../shared/chrome.js"></script>
</body>
</html>
