<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recart · Board slide</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/theme.css">
<link rel="stylesheet" href="../shared/board.css">
</head>
<body>
<div class="screen">
  <canvas class="bg-canvas" id="bgCanvas"></canvas>
  <div class="clock" id="clock-el"></div>
  <div class="left">
    <div>
      <div class="brand">
        <div class="logo-wrap"></div>
        <div class="top-label">Budapest office</div>
      </div>
      <!-- EDIT: the headline (use <br> to break lines) -->
      <div class="main-title">What's<br>coming<br>up</div>
      <div class="month-badge" id="month-badge"></div>
      <div class="countdown-box">
        <div class="countdown-label">Next event</div>
        <div class="countdown-next" id="cd-name"></div>
        <div>
          <span class="countdown-num" id="cd-days">—</span>
          <span class="countdown-unit" id="cd-unit">days to go</span>
        </div>
      </div>
    </div>
  </div>
  <div class="right">
    <div class="events-section">
      <div class="section-label">Upcoming events</div>
      <div id="events-list"></div>
    </div>
    <div class="birthdays-section" id="bdays-section">
      <div class="bday-label">Upcoming birthdays</div>
      <div id="bdays-list"></div>
    </div>
  </div>
</div>

<script>
// ─── EDIT HERE ─────────────────────────────────────────────────
// date must be 'YYYY-MM-DD' inside new Date(...). The "date" text is what shows on screen.
const EVENTS = [
  { icon: '🥐', date: '25 Jun', label: 'Community breakfast', time: '9:00 – 10:00am', dateObj: new Date('2026-06-25') },
  { icon: '🍔', date: '1 Jul',  label: 'Team lunch',          time: '12:00 – 1:00pm', dateObj: new Date('2026-07-01') },
];
const BIRTHDAYS = [
  { name: 'Name', date: '1 Jul', dateObj: new Date('2026-07-01') },
];
// ──────────────────────────────────────────────────────────────
</script>
<script src="../shared/chrome.js"></script>
<script src="../shared/board.js"></script>
</body>
</html>
